---
- name: WezTerm
  hosts: all
  vars:
    wezterm_bin: "{{ ansible_facts['env']['HOME'] }}/.local/bin/wezterm"
  tasks:
    - name: Check if WezTerm already installed
      stat:
        path: "{{ wezterm_bin }}"
      register: wezterm_stat

    - name: Ensure ~/.local/bin exists
      file:
        path: "{{ ansible_facts['env']['HOME'] }}/.local/bin"
        state: directory
        mode: '0755'

    - name: Download WezTerm AppImage
      get_url:
        # Update wezterm_version in group_vars/all.yml when bumping.
        # Verify the filename format matches the release page for the new version.
        url: "https://github.com/wezterm/wezterm/releases/download/{{ wezterm_version }}/WezTerm-{{ wezterm_version }}-Ubuntu20.04.AppImage"
        dest: "{{ wezterm_bin }}"
        mode: '0755'
      when: not wezterm_stat.stat.exists
